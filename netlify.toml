# Netlify Configuration for Mantik - Astro static site

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "22"

# Canonical domain: HTTPS + non-www
[[redirects]]
  from = "http://www.mantik.netlify.app/*"
  to = "https://mantik.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.mantik.netlify.app/*"
  to = "https://mantik.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://mantik.netlify.app/*"
  to = "https://mantik.netlify.app/:splat"
  status = 301
  force = true

# Trailing slash normalization
[[redirects]]
  from = "/java/"
  to = "/java"
  status = 301

[[redirects]]
  from = "/frc/"
  to = "/frc"
  status = 301

[[redirects]]
  from = "/ftc/"
  to = "/ftc"
  status = 301

[[redirects]]
  from = "/comp/"
  to = "/comp"
  status = 301

[[redirects]]
  from = "/java/*/"
  to = "/java/:splat"
  status = 301

[[redirects]]
  from = "/frc/*/"
  to = "/frc/:splat"
  status = 301

[[redirects]]
  from = "/ftc/*/"
  to = "/ftc/:splat"
  status = 301

[[redirects]]
  from = "/comp/*/"
  to = "/comp/:splat"
  status = 301

[[redirects]]
  from = "/pid-simulation/"
  to = "/pid-simulation"
  status = 301

[[redirects]]
  from = "/resources/"
  to = "/resources"
  status = 301

# Decap CMS
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://mantik.netlify.app https://*.netlify.app https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
